name: Governance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Skills tree matches plugin.json and README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify governance invariants
        run: |
          set -euo pipefail
          fail=0

          # Published buckets per CLAUDE.md governance
          buckets="discovery modeling quality operations setup"

          for bucket in $buckets; do
            [ -d "skills/$bucket" ] || continue
            for dir in skills/$bucket/*/; do
              name=$(basename "$dir")
              path="./skills/$bucket/$name"

              # Must have a SKILL.md
              if [ ! -f "$dir/SKILL.md" ]; then
                echo "::error::$dir is missing SKILL.md"
                fail=1
              fi

              # Must be in plugin.json
              if ! jq -e --arg p "$path" '.skills | index($p)' .claude-plugin/plugin.json > /dev/null; then
                echo "::error::$path missing from .claude-plugin/plugin.json"
                fail=1
              fi

              # Must be linked in README.md
              if ! grep -q "skills/$bucket/$name/SKILL.md" README.md; then
                echo "::error::skills/$bucket/$name not linked in README.md"
                fail=1
              fi
            done
          done

          # Every plugin.json entry must exist on disk
          for path in $(jq -r '.skills[]' .claude-plugin/plugin.json); do
            if [ ! -f "$path/SKILL.md" ]; then
              echo "::error::plugin.json references $path but $path/SKILL.md does not exist"
              fail=1
            fi
          done

          # Unpublished buckets must not appear in plugin.json or README
          for bucket in personal deprecated; do
            if jq -e --arg b "./skills/$bucket/" '.skills[] | select(startswith($b))' .claude-plugin/plugin.json > /dev/null 2>&1; then
              echo "::error::plugin.json contains skills from unpublished bucket $bucket/"
              fail=1
            fi
          done

          exit $fail
